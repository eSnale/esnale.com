<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>eSnale Order Information</title>

<style>

body {
background:
linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.75)),
url('tile.jfif');
background-repeat: repeat;
background-size: 300px 300px;
background-color: #f2f2f2;
margin-left: 10px;
margin-right: 10px;
}

.section-title {
font-size: 2em;
margin-top: 25px;
margin-bottom: 10px;
}

.info-line {
margin-bottom: 6px;
word-wrap: break-word;
}

.puzzle-list {
columns: 2;
-webkit-columns: 2;
-moz-columns: 2;
}

@media screen and (max-width: 700px) {
.puzzle-list {
columns: 1;
-webkit-columns: 1;
-moz-columns: 1;
}
}

hr {
margin-top: 20px;
margin-bottom: 20px;
}

</style>
</head>

<body>

<div id="confirmation" style="
max-width: 800px;
margin: 30px auto;

font-size: 16px;
line-height: normal;

text-align: justify;
text-justify: inter-word;

white-space: pre-line;
"></div>

<script>

const params = new URLSearchParams(window.location.search);

function get(id) {
  return params.get(id) || "";
}

/* =========================
   NEXT MONTH
========================= */

const months = [
  "January",
  "February",
  "March",
  "April",
  "May",
  "June",
  "July",
  "August",
  "September",
  "October",
  "November",
  "December"
];

const today = new Date();

const nextMonth =
  months[(today.getMonth() + 1) % 12];

/* =========================
   ORDER NUMBER
========================= */

const orderNumber =
  Math.floor(Math.random() * 0x1000000)
    .toString(16)
    .toUpperCase()
    .padStart(6, "0");

/* =========================
   INSTRUCTIONS TEXT
========================= */

const instructionsText =
  params.has("no_instructions")
    ? "WITHOUT"
    : "WITH";

/* =========================
   MAIL PAYMENT TEXT
========================= */

let mailPaymentText = "";

if (params.has("check_mo")) {

  mailPaymentText =
`\u00A0\u00A0Please send check or money order to:
<div style="text-align: center;">
<div style="display: inline-block; text-align: left;">
eSnale
PO Box 40735
Grand Junction, CO 81504
</div>
</div>`;
}

/* =========================
   BUILD CONFIRMATION MESSAGE
========================= */

let confirmationMessage =
`

Thanks, ${get("billing_name")}!

Your order number is ${orderNumber}, and your puzzles will be mailed ${instructionsText} instructions on ${nextMonth} 1st, or on the first business day thereafter (whichever is soonest).`;

if (mailPaymentText !== "") {
  confirmationMessage += `${mailPaymentText}`;
}

confirmationMessage += `

Please check your email for confirmation of this order, and please don't hesitate to respond with any questions or concerns.\u00A0\u00A0Thanks again!

Sincerely,
The eSnale Team`;

/* =========================
   DISPLAY ON PAGE
========================= */

document.getElementById("confirmation").innerHTML =
  confirmationMessage;

</script>

</body>
</html>

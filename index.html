<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Form</title>

<style>
  input[type="text"] {
    text-align: right;
  }

  input[type="text"]::placeholder {
    text-align: right;
  }

body {
background:
linear-gradient(rgba(255,255,255,0.8), rgba(255,255,255,0.75)),
url('tile.jfif');
background-repeat: repeat;
background-size: 300px 300px;
background-color: #f2f2f2;
}


</style>

</head>

<body>
  <form action="05a.html" method="GET">

    <label>
      <input type="checkbox" name="chess_problems" value="yes">
      Chess Problems
    </label>

    <label>
      <input type="checkbox" name="cryptoquotes" value="yes">
      CryptoQuotes
    </label>

    <label>
      <input type="checkbox" name="diagonal_samurai" value="yes">
      Diagonal Samurai
    </label>

    <label>
      <input type="checkbox" name="diagonal_sudoku" value="yes">
      Diagonal Sudoku
    </label>

    <label>
      <input type="checkbox" name="minesweeper" value="yes">
      Minesweeper
    </label>

    <label>
      <input type="checkbox" name="samurai_sudoku" value="yes">
      Samurai Sudoku
    </label>

    <label>
      <input type="checkbox" name="sudoku" value="yes">
      Sudoku
    </label>

    <br><br>

<hr>

    <br>

    <div>
      <label for="name">Name</label><br>
      <input type="text" id="name" name="name" placeholder="John Smith" autocomplete="name" onfocus="this.placeholder=''" onblur="if(this.value===''){this.placeholder='John Smith'}">
    </div>

    <div>
      <label for="email">Email Address</label><br>
      <input type="text" id="email" name="email" placeholder="email@domain.com" autocomplete="email" onfocus="this.placeholder=''" onblur="if(this.value===''){this.placeholder='email@domain.com'}">
    </div>


    <br><br>

    <button type="submit">Submit</button>
  </form>
</body>
</html>
